[build]
publish = ".output/public"
command = "pnpm install && pnpm run build"

[build.environment]
NODE_VERSION = "20"

[[redirects]]
from = "/api/*"
to = "/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/.netlify/functions/server"
status = 200

[functions]
directory = "netlify/functions"
node_bundler = "esbuild"
