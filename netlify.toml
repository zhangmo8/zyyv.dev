[build]
publish = "dist"
command = "pnpm run build"

[build.environment]
NODE_VERSION = "20"

[[redirects]]
from = "/api/*"
to = "/api/:splat"
status = 200

[[redirects]]
from = "/*"
to = "/:splat"
status = 200
conditions = { Response-Code = ["404"] }

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
